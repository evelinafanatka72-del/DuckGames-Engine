<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Duck Studio Ultimate v5.5 — Hybrid Game Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', 'Courier New', monospace;
            touch-action: none;
        }

        /* Неоновый UI */
        :root {
            --neon: #0ff;
            --pink: #f0f;
            --gold: #ffaa44;
            --dark-bg: #0a0a1a;
            --panel-bg: rgba(10, 10, 26, 0.95);
        }

        /* Вьюпорт движка */
        #viewport {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 3000px;
            height: 3000px;
            transform: translate(-50%, -50%);
            transform-style: preserve-3d;
            transition: transform 0.2s ease;
            will-change: transform;
            pointer-events: auto;
        }

        /* Базовый стиль объектов */
        .obj {
            position: absolute;
            cursor: grab;
            transition: box-shadow 0.1s, transform 0.05s linear;
            will-change: transform;
            pointer-events: auto;
        }
        .obj:active { cursor: grabbing; }
        .obj.selected {
            box-shadow: 0 0 0 3px var(--gold), 0 0 0 6px rgba(255, 170, 68, 0.3);
            z-index: 1000;
        }

        /* Типы объектов */
        .obj[data-type="box"] {
            background: linear-gradient(135deg, #2a6f8f, #0a3f5f);
            border: 2px solid var(--neon);
            border-radius: 8px;
        }
        .obj[data-type="circle"] {
            background: radial-gradient(circle at 30% 30%, #ff66aa, #aa2266);
            border-radius: 50%;
            border: 2px solid var(--pink);
        }
        .obj[data-type="text"] {
            background: none;
            color: var(--neon);
            font-size: 20px;
            text-shadow: 0 0 5px var(--neon);
            white-space: nowrap;
            font-weight: bold;
            cursor: default;
        }
        .obj[data-type="portal"] {
            background: radial-gradient(circle, #ff44aa, #aa22ff);
            border-radius: 12px;
            animation: pulse 1.5s infinite;
        }
        .obj[data-type="spike"] {
            background: #aa3333;
            clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
        }

        @keyframes pulse {
            0% { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        /* UI Панели */
        .ui-panel {
            position: fixed;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--neon);
            border-radius: 16px;
            padding: 12px;
            color: #fff;
            z-index: 2000;
            font-size: 14px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        #mode-switch {
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }
        .mode-btn {
            background: #1a1a2a;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 15px var(--neon);
        }

        #chat-panel {
            bottom: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            height: 300px;
            display: flex;
            flex-direction: column;
        }
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            font-size: 12px;
            padding: 8px;
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            margin-bottom: 8px;
        }
        #chat-input {
            display: flex;
            gap: 8px;
        }
        #chat-input input {
            flex: 1;
            background: #1a1a2a;
            border: 1px solid var(--neon);
            color: #fff;
            padding: 8px;
            border-radius: 40px;
            font-family: monospace;
        }
        #chat-input button {
            background: var(--neon);
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
        }

        #script-editor {
            top: 20px;
            right: 20px;
            width: 400px;
            height: 500px;
            display: none;
            flex-direction: column;
            backdrop-filter: blur(20px);
        }
        #script-editor.active {
            display: flex;
        }
        #script-text {
            flex: 1;
            background: #0a0a1a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            border: 1px solid var(--neon);
            padding: 10px;
            resize: none;
            outline: none;
        }
        .editor-toolbar {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .editor-toolbar button {
            background: #1a1a2a;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        #hammer-menu {
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .hammer-btn {
            background: var(--pink);
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
        }

        .gizmo {
            position: absolute;
            background: rgba(255,255,255,0.2);
            border: 2px solid var(--gold);
            border-radius: 4px;
            pointer-events: none;
            z-index: 2000;
        }
    </style>
</head>
<body>

<div id="viewport"></div>

<!-- UI Панели -->
<div id="mode-switch" class="ui-panel">
    <button class="mode-btn active" data-mode="2d">2D Mode</button>
    <button class="mode-btn" data-mode="3d">3D Mode</button>
</div>

<div id="chat-panel" class="ui-panel">
    <div id="chat-messages"></div>
    <div id="chat-input">
        <input type="text" id="chat-text" placeholder="Сообщение...">
        <button id="chat-send">📨</button>
    </div>
</div>

<div id="script-editor" class="ui-panel">
    <textarea id="script-text" placeholder="Напишите скрипт для объекта..."></textarea>
    <div class="editor-toolbar">
        <button id="save-script">💾 Сохранить</button>
        <button id="clear-script">🗑 Очистить</button>
        <button id="debug-script">🐞 Дебаг</button>
        <button id="close-editor">❌</button>
    </div>
</div>

<div id="hammer-menu" class="ui-panel">
    <button class="hammer-btn" id="spawn-text">📝 Текст</button>
    <button class="hammer-btn" id="spawn-box">🧱 Куб</button>
    <button class="hammer-btn" id="spawn-portal">🌀 Портал</button>
    <button class="hammer-btn" id="toggle-editor">📜 Редактор</button>
</div>

<script>
    // ============================================
    // DUCK STUDIO ULTIMATE v5.5 — ПОЛНЫЙ ДВИЖОК
    // ============================================
    (function() {
        // ----- КОНФИГ -----
        const config = {
            viewport: document.getElementById('viewport'),
            camX: 0, camY: 0,
            drag: false, dragStart: { x: 0, y: 0 },
            objects: new Map(),
            nextId: 1,
            is3D: false,
            selectedObj: null,
            ws: null,
            userId: 'user_' + Math.random().toString(36).substr(2, 6),
            cloudKey: 'duck_world'
        };

        // ----- ИНИЦИАЛИЗАЦИЯ КАМЕРЫ -----
        function initCamera() {
            config.viewport.addEventListener('mousedown', (e) => {
                if (e.target === config.viewport || e.target === document.body) {
                    config.drag = true;
                    config.dragStart = { x: e.clientX - config.camX, y: e.clientY - config.camY };
                    config.viewport.style.cursor = 'grabbing';
                }
            });
            window.addEventListener('mousemove', (e) => {
                if (!config.drag) return;
                config.camX = e.clientX - config.dragStart.x;
                config.camY = e.clientY - config.dragStart.y;
                updateCamera();
            });
            window.addEventListener('mouseup', () => {
                config.drag = false;
                config.viewport.style.cursor = 'grab';
            });
            // touch support
            config.viewport.addEventListener('touchstart', (e) => {
                if (e.target === config.viewport) {
                    const touch = e.touches[0];
                    config.drag = true;
                    config.dragStart = { x: touch.clientX - config.camX, y: touch.clientY - config.camY };
                }
            });
            window.addEventListener('touchmove', (e) => {
                if (!config.drag) return;
                const touch = e.touches[0];
                config.camX = touch.clientX - config.dragStart.x;
                config.camY = touch.clientY - config.dragStart.y;
                updateCamera();
            });
            window.addEventListener('touchend', () => { config.drag = false; });
        }

        function updateCamera() {
            config.viewport.style.transform = `translate(${config.camX}px, ${config.camY}px) ${config.is3D ? 'perspective(1200px) rotateX(55deg)' : ''}`;
        }

        // ----- СОЗДАНИЕ ОБЪЕКТОВ -----
        function createObject(type, x, y, z = 0, width = 80, height = 80, script = '') {
            const id = config.nextId++;
            const obj = document.createElement('div');
            obj.className = 'obj';
            obj.setAttribute('data-type', type);
            obj.setAttribute('data-id', id);
            obj.setAttribute('data-script', script);
            obj.dataset.x = x;
            obj.dataset.y = y;
            obj.dataset.z = z;
            obj.style.width = width + 'px';
            obj.style.height = height + 'px';
            obj.style.left = (x - width/2) + 'px';
            obj.style.top = (y - height/2) + 'px';
            if (config.is3D) {
                obj.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
            } else {
                obj.style.transform = `translate(${x}px, ${y}px)`;
            }

            // Выделение
            obj.addEventListener('click', (e) => {
                e.stopPropagation();
                if (config.selectedObj) config.selectedObj.classList.remove('selected');
                config.selectedObj = obj;
                obj.classList.add('selected');
                document.getElementById('script-text').value = obj.getAttribute('data-script') || '';
                e.stopPropagation();
            });

            // Перетаскивание
            let isDragging = false;
            obj.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                isDragging = true;
                e.stopPropagation();
                const startX = e.clientX;
                const startY = e.clientY;
                const startLeft = parseFloat(obj.style.left);
                const startTop = parseFloat(obj.style.top);
                const onMove = (moveEvent) => {
                    if (!isDragging) return;
                    const dx = moveEvent.clientX - startX;
                    const dy = moveEvent.clientY - startY;
                    const newX = startLeft + dx;
                    const newY = startTop + dy;
                    obj.style.left = newX + 'px';
                    obj.style.top = newY + 'px';
                    obj.dataset.x = newX + parseFloat(obj.style.width)/2;
                    obj.dataset.y = newY + parseFloat(obj.style.height)/2;
                    syncObjectToNetwork(id, { x: obj.dataset.x, y: obj.dataset.y });
                };
                const onUp = () => {
                    isDragging = false;
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onUp);
                    saveWorld();
                };
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
            });
            config.viewport.appendChild(obj);
            config.objects.set(id, obj);
            saveWorld();
            return obj;
        }

        // ----- СОХРАНЕНИЕ В ОБЛАКО (Telegram CloudStorage) -----
        async function saveWorld() {
            const worldData = [];
            for (let [id, obj] of config.objects) {
                worldData.push({
                    id: id,
                    type: obj.getAttribute('data-type'),
                    x: obj.dataset.x,
                    y: obj.dataset.y,
                    z: obj.dataset.z || 0,
                    width: obj.style.width,
                    height: obj.style.height,
                    script: obj.getAttribute('data-script')
                });
            }
            if (window.Telegram?.WebApp?.CloudStorage) {
                Telegram.WebApp.CloudStorage.setItem(config.cloudKey, JSON.stringify(worldData), () => {});
                console.log('World saved to cloud');
            } else {
                localStorage.setItem(config.cloudKey, JSON.stringify(worldData));
            }
        }

        async function loadWorld() {
            let data = null;
            if (window.Telegram?.WebApp?.CloudStorage) {
                data = await new Promise((resolve) => {
                    Telegram.WebApp.CloudStorage.getItem(config.cloudKey, (err, val) => {
                        if (val) resolve(JSON.parse(val));
                        else resolve(null);
                    });
                });
            } else {
                const saved = localStorage.getItem(config.cloudKey);
                if (saved) data = JSON.parse(saved);
            }
            if (data) {
                for (let objData of data) {
                    const obj = createObject(objData.type, parseFloat(objData.x), parseFloat(objData.y), parseFloat(objData.z), parseFloat(objData.width), parseFloat(objData.height), objData.script);
                    obj.setAttribute('data-script', objData.script);
                }
            } else {
                // демо объекты
                createObject('box', 400, 300, 0, 100, 100, 'console.log("Hello from Duck!");');
                createObject('circle', 600, 500, 0, 80, 80);
                createObject('portal', 800, 400, 0, 70, 70);
                createObject('text', 500, 200, 0, 150, 40, 'this.innerText = "🦆 Duck Studio";');
            }
        }

        // ----- 3D/2D ПЕРЕКЛЮЧЕНИЕ -----
        function set3DMode(enabled) {
            config.is3D = enabled;
            updateCamera();
            for (let [id, obj] of config.objects) {
                const x = parseFloat(obj.dataset.x);
                const y = parseFloat(obj.dataset.y);
                const z = parseFloat(obj.dataset.z || 0);
                if (enabled) {
                    obj.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
                } else {
                    obj.style.transform = `translate(${x}px, ${y}px)`;
                }
            }
        }

        // ----- СЕТЬ (WebSocket для синхронизации) -----
        function initNetwork() {
            config.ws = new WebSocket('wss://echo.websocket.org'); // тестовый эхо-сервер
            config.ws.onopen = () => {
                console.log('WebSocket connected');
                config.ws.send(JSON.stringify({ type: 'join', userId: config.userId }));
            };
            config.ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'sync_obj') {
                    const obj = config.objects.get(parseInt(msg.objId));
                    if (obj) {
                        obj.style.left = (msg.data.x - parseFloat(obj.style.width)/2) + 'px';
                        obj.style.top = (msg.data.y - parseFloat(obj.style.height)/2) + 'px';
                        obj.dataset.x = msg.data.x;
                        obj.dataset.y = msg.data.y;
                    }
                }
            };
        }

        function syncObjectToNetwork(id, data) {
            if (config.ws && config.ws.readyState === WebSocket.OPEN) {
                config.ws.send(JSON.stringify({ type: 'sync_obj', objId: id, data }));
            }
        }

        // ----- ГЛОБАЛЬНЫЙ ЧАТ -----
        function appendChatMessage(sender, text) {
            const container = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.innerHTML = `<b>${sender}:</b> ${text}`;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-text');
            const text = input.value;
            if (!text.trim()) return;
            appendChatMessage(config.userId, text);
            if (config.ws && config.ws.readyState === WebSocket.OPEN) {
                config.ws.send(JSON.stringify({ type: 'global_chat', sender: config.userId, text }));
            }
            input.value = '';
        }

        // ----- РЕДАКТОР СКРИПТОВ -----
        function openScriptEditor() {
            const editor = document.getElementById('script-editor');
            editor.classList.toggle('active');
        }

        function saveScriptToObject() {
            if (!config.selectedObj) return alert('Выберите объект');
            const script = document.getElementById('script-text').value;
            config.selectedObj.setAttribute('data-script', script);
            saveWorld();
            alert('Скрипт сохранён');
        }

        function debugScript() {
            if (!config.selectedObj) return alert('Выберите объект');
            const script = config.selectedObj.getAttribute('data-script');
            if (!script) return alert('Скрипт пуст');
            try {
                const func = new Function('obj', script);
                func(config.selectedObj);
                alert('Скрипт выполнен без ошибок');
            } catch(e) {
                alert('Ошибка: ' + e.message);
            }
        }

        // ----- HAMMER MENU (спавн объектов)-----
        function spawnFloatingText() {
            const x = 400 + Math.random() * 800;
            const y = 300 + Math.random() * 600;
            const textObj = createObject('text', x, y, 0, 200, 50, 'this.innerText = "Новая надпись 🦆";');
            textObj.innerText = 'Новая надпись 🦆';
        }

        // ----- ИНИЦИАЛИЗАЦИЯ UI -----
        function bindUI() {
            document.getElementById('mode-switch').addEventListener('click', (e) => {
                const btn = e.target.closest('.mode-btn');
                if (!btn) return;
                const mode = btn.dataset.mode;
                if (mode === '3d') set3DMode(true);
                else set3DMode(false);
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
            document.getElementById('chat-send').addEventListener('click', sendChatMessage);
            document.getElementById('chat-text').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChatMessage(); });
            document.getElementById('toggle-editor').addEventListener('click', openScriptEditor);
            document.getElementById('save-script').addEventListener('click', saveScriptToObject);
            document.getElementById('clear-script').addEventListener('click', () => { document.getElementById('script-text').value = ''; });
            document.getElementById('debug-script').addEventListener('click', debugScript);
            document.getElementById('close-editor').addEventListener('click', () => { document.getElementById('script-editor').classList.remove('active'); });
            document.getElementById('spawn-text').addEventListener('click', spawnFloatingText);
            document.getElementById('spawn-box').addEventListener('click', () => createObject('box', 500, 400, 0, 80, 80));
            document.getElementById('spawn-portal').addEventListener('click', () => createObject('portal', 600, 500, 0, 70, 70));
        }

        // ----- ЗАПУСК -----
        window.addEventListener('load', async () => {
            initCamera();
            await loadWorld();
            bindUI();
            initNetwork();
            if (window.Telegram?.WebApp) Telegram.WebApp.ready();
            console.log('Duck Studio Ultimate v5.5 — fully loaded');
        });
    })();
</script>
</body>
</html>

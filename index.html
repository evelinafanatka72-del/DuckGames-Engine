<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck Studio Ultimate Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --gold: #ffd700; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        /* ХАБ */
        #hub { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; }
        .hub-header { padding: 20px; background: #111; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; }
        .feed { flex-grow: 1; padding: 15px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-card { background: #1a1a1a; border-radius: 10px; padding: 10px; border: 1px solid #333; }
        .create-plus { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--neon); border-radius: 50%; border: none; font-size: 35px; box-shadow: 0 0 20px var(--neon); z-index: 2100; }

        /* РЕДАКТОР */
        #editor { display: none; flex-direction: column; height: 100vh; }
        .top-bar { display: flex; justify-content: space-between; padding: 8px 15px; background: #111; border-bottom: 2px solid var(--neon); font-size: 11px; }
        
        #world-container { flex-grow: 1; position: relative; overflow: hidden; perspective: 1200px; background: #050505; }
        #viewport { 
            width: 3000px; height: 3000px; position: absolute; transform-style: preserve-3d; transition: transform 0.8s ease;
            background-image: radial-gradient(rgba(0, 242, 255, 0.1) 1px, transparent 1px); background-size: 40px 40px;
        }

        .obj { position: absolute; width: 35px; height: 35px; transform-style: preserve-3d; display: flex; align-items: center; justify-content: center; font-size: 10px; text-align: center; }
        .shape-circle { border-radius: 50%; }
        .selected { border: 2px solid #fff !important; box-shadow: 0 0 20px #fff !important; }

        /* ИНСПЕКТОР И СКРИПТЫ */
        .inspector { background: #111; padding: 10px; border-top: 1px solid #333; }
        .script-label { color: var(--gold); font-size: 12px; margin-bottom: 5px; display: block; }
        textarea { width: 95%; background: #000; color: #0f0; border: 1px solid #444; height: 60px; font-size: 11px; border-radius: 5px; }

        .tool-row { background: #111; padding: 8px; display: flex; gap: 10px; overflow-x: auto; border-top: 1px solid #333; }
        .lib-btn { background: #222; color: #fff; border: 1px solid var(--neon); padding: 6px 10px; border-radius: 4px; font-size: 10px; white-space: nowrap; }
        
        .d-pad { position: absolute; bottom: 220px; right: 20px; display: grid; grid-template-columns: repeat(3, 40px); gap: 5px; opacity: 0.5; }
        .nav-btn { background: #222; border: 1px solid var(--neon); color: #fff; border-radius: 5px; text-align: center; line-height: 40px; }

        .main-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 8px; background: #111; border-top: 1px solid #444; }
        .btn { background: #1a1a1a; border: 1px solid var(--neon); color: var(--neon); padding: 10px 0; font-size: 9px; border-radius: 4px; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="hub">
    <div class="hub-header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="width:35px; height:35px; background:var(--pink); border-radius:50%;"></div>
            <span style="font-weight:bold;">OCTO_DEV</span>
        </div>
        <div style="color:var(--gold);">1000 🟡</div>
    </div>
    <div class="feed" id="gameFeed">
        <div class="game-card" onclick="tg.showAlert('Запуск Chicken War...')"><center>🐥<br>Chicken War</center></div>
        <div class="game-card" onclick="tg.showAlert('Запуск Duck Space...')"><center>🌌<br>Duck Space</center></div>
    </div>
    <button class="create-plus" onclick="startEditor()">+</button>
</div>

<div id="editor">
    <div class="top-bar">
        <div id="selected-info">DUCK_STUDIO_V5.5</div>
        <button onclick="saveAndExit()" style="background:none; border:none; color:#ff4444;">[ ВЫХОД ]</button>
    </div>

    <div id="world-container">
        <div id="viewport" onmousedown="startDraw(event)" onmousemove="drawing(event)" onmouseup="stopDraw()" ontouchstart="startDraw(event)" ontouchmove="drawing(event)" ontouchend="stopDraw()"></div>
        
        <div class="d-pad">
            <div class="nav-btn" style="grid-column:2" onclick="moveCam(0, 80)">▲</div>
            <div class="nav-btn" onclick="moveCam(80, 0)">◀</div>
            <div class="nav-btn" onclick="moveCam(0, 0)">🏠</div>
            <div class="nav-btn" onclick="moveCam(-80, 0)">▶</div>
            <div class="nav-btn" style="grid-column:2" onclick="moveCam(0, -80)">▼</div>
        </div>
    </div>

    <div class="tool-row">
        <button class="lib-btn" onclick="currentShape='box'">🟦 КУБ</button>
        <button class="lib-btn" onclick="currentShape='circle'">🔵 КРУГ</button>
        <button class="lib-btn" onclick="currentShape='text'">✍️ ТЕКСТ</button>
        <button class="lib-btn" onclick="toggleExtra()" style="border-color:var(--gold);">🔨 ДОП.</button>
        <input type="color" id="colorPicker" value="#00f2ff" onchange="currentColor = this.value">
    </div>

    <div id="extra-panel" class="tool-row hidden" style="background:#1a1a1a;">
        <button class="lib-btn" onclick="currentShape='portal'">🌀 ПОРТАЛ</button>
        <button class="lib-btn" onclick="currentShape='spike'">⚠️ ШИПЫ</button>
        <button class="lib-btn" onclick="tg.showAlert('Свет добавлен')">💡 СВЕТ</button>
    </div>

    <div id="script-panel" class="inspector hidden">
        <span class="script-label">📃 Меню Скриптов</span>
        <div class="tool-row" style="padding:0; margin-bottom:5px; border:none;">
            <button class="lib-btn" onclick="setScript('move')">🏃 МОВЕ</button>
            <button class="lib-btn" onclick="setScript('spin')">🔄 СПИН</button>
            <button class="lib-btn" onclick="setScript('bounce')">🏀 ПРЫЖОК</button>
            <button class="lib-btn" onclick="clearScript()" style="color:red; border-color:red;">🧹 ОЧИСТИТЬ</button>
        </div>
        <textarea id="scriptInput" oninput="updateObjScript()" placeholder="Скрипт объекта..."></textarea>
    </div>

    <div class="main-menu">
        <button class="btn" onclick="saveProject()">💾 СОХРАНИТЬ</button>
        <button class="btn" id="btn3d" onclick="toggle3D()">🧊 3D VIEW</button>
        <button class="btn" onclick="toggleScripts()">📜 SCRIPTS</button>
        <button class="btn" onclick="clearAll()" style="color:red;">🧹 СБРОС</button>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let currentColor = '#00f2ff';
    let currentShape = 'box';
    let is3D = false;
    let selectedObject = null;
    let isDrawing = false;
    let camX = 0, camY = 0;

    const scripts = {
        'move': 'this.x += Math.sin(Date.now()/500)*2;',
        'spin': 'this.rotateY += 5;',
        'bounce': 'this.y += Math.abs(Math.sin(Date.now()/300))*10;'
    };

    // Загрузка при старте
    window.onload = () => {
        const saved = localStorage.getItem('duck_save');
        if(saved) {
            document.getElementById('gameFeed').innerHTML += `
                <div class="game-card" style="border-color:var(--pink)" onclick="loadProject()">
                    <center>💾<br>МОЙ ПРОЕКТ</center>
                </div>`;
        }
    };

    function startEditor() {
        document.getElementById('hub').style.display = 'none';
        document.getElementById('editor').style.display = 'flex';
    }

    function saveAndExit() {
        saveProject();
        location.reload(); // Чиним баг с обновлением
    }

    function moveCam(x, y) {
        camX += x; camY += y;
        document.getElementById('viewport').style.marginLeft = camX + 'px';
        document.getElementById('viewport').style.marginTop = camY + 'px';
    }

    function startDraw(e) {
        if(e.target.classList.contains('obj')) {
            selectObject(e.target);
            return;
        }
        isDrawing = true; spawn(e);
    }

    function drawing(e) { if(isDrawing && !is3D && Math.random() > 0.85) spawn(e); }
    function stopDraw() { isDrawing = false; }

    function spawn(e) {
        const view = document.getElementById('viewport');
        const rect = view.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const x = clientX - rect.left - 17;
        const y = clientY - rect.top - 17;

        const obj = document.createElement('div');
        obj.className = 'obj';
        obj.dataset.script = ""; // Чистая память скрипта
        
        if(currentShape === 'circle') obj.classList.add('shape-circle');
        if(currentShape === 'text') {
            obj.innerText = "TEXT";
            obj.style.color = currentColor;
        } else if(currentShape === 'portal') {
            obj.innerText = "🌀";
            obj.style.fontSize = "25px";
        } else {
            obj.style.backgroundColor = currentColor;
            obj.style.boxShadow = `0 0 10px ${currentColor}`;
        }
        
        obj.style.left = x + 'px';
        obj.style.top = y + 'px';
        
        view.appendChild(obj);
        selectObject(obj);
    }

    function selectObject(el) {
        if(selectedObject) selectedObject.classList.remove('selected');
        selectedObject = el;
        selectedObject.classList.add('selected');
        document.getElementById('scriptInput').value = el.dataset.script || "";
        tg.HapticFeedback.impactOccurred('light');
    }

    function setScript(key) {
        if(!selectedObject) return tg.showAlert("Сначала выбери блок!");
        const code = scripts[key];
        document.getElementById('scriptInput').value = code;
        selectedObject.dataset.script = code;
    }

    function clearScript() {
        document.getElementById('scriptInput').value = "";
        if(selectedObject) selectedObject.dataset.script = "";
    }

    function updateObjScript() {
        if(selectedObject) selectedObject.dataset.script = document.getElementById('scriptInput').value;
    }

    function toggle3D() {
        is3D = !is3D;
        const view = document.getElementById('viewport');
        if(is3D) {
            view.style.transform = "rotateX(55deg) rotateZ(-35deg) translateZ(-50px)";
            document.querySelectorAll('.obj').forEach(o => {
                o.style.height = '50px';
                o.style.transform = "translateZ(25px)";
                o.style.border = "1px solid rgba(255,255,255,0.2)";
            });
            tg.showAlert("Unity-style 3D Active");
        } else {
            view.style.transform = "none";
            document.querySelectorAll('.obj').forEach(o => {
                o.style.height = '35px';
                o.style.transform = "none";
            });
        }
    }

    function toggleScripts() { document.getElementById('script-panel').classList.toggle('hidden'); }
    function toggleExtra() { document.getElementById('extra-panel').classList.toggle('hidden'); }

    function saveProject() {
        const html = document.getElementById('viewport').innerHTML;
        localStorage.setItem('duck_save', html);
        tg.showAlert("Проект сохранен! 🦆");
    }

    function loadProject() {
        startEditor();
        const data = localStorage.getItem('duck_save');
        if(data) document.getElementById('viewport').innerHTML = data;
    }

    function clearAll() {
        if(confirm("Удалить всё?")) document.getElementById('viewport').innerHTML = "";
    }
</script>
</body>
</html>

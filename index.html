<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck Mode Ultra Studio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --dark: #050505; --pink: #ff00ff; }
        body { background: var(--dark); color: var(--neon); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; touch-action: manipulation; }
        
        /* ШАПКА ШТАБА */
        .header { background: #111; padding: 10px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .stats { font-size: 12px; color: var(--pink); text-shadow: 0 0 5px var(--pink); }

        /* ЗОНА СТРОИТЕЛЬСТВА (GRID) */
        .build-area { 
            width: 90vw; height: 300px; margin: 15px auto; 
            background-image: linear-gradient(var(--neon) 1px, transparent 1px), linear-gradient(90deg, var(--neon) 1px, transparent 1px);
            background-size: 30px 30px; border: 1px solid rgba(0, 242, 255, 0.3);
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .duck-object { width: 30px; height: 30px; background: gold; border-radius: 5px; position: absolute; box-shadow: 0 0 10px gold; }

        /* ПАНЕЛЬ УПРАВЛЕНИЯ */
        .panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .btn { 
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon); color: var(--neon); 
            padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        .btn:active { background: var(--neon); color: #000; }
        .btn.upgrade { border-color: var(--pink); color: var(--pink); }

        /* ТВОИ КРУТЫЕ ИДЕИ В НАСТРОЙКАХ */
        #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding-top: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <div><b>DUCK MODE v4.2</b></div>
        <div class="stats">CORE TEMP: 36.6°C | OCTO-LINK: OK</div>
    </div>

    <div class="build-area" id="map" onclick="placeObject(event)">
        <p id="hint">Нажми на сетку, чтобы строить блоки</p>
    </div>

    <div class="panel">
        <button class="btn" onclick="clearMap()">🧹 Очистить</button>
        <button class="btn" onclick="saveProject()">💾 Сохранить</button>
        <button class="btn upgrade" onclick="upgradeEngine()">⚡ Улучшить движок</button>
        <button class="btn" onclick="toggleSettings()">⚙️ Секреты Октокота</button>
    </div>

    <div id="settings-panel">
        <h2>🛠 ЭКСПЕРИМЕНТАЛЬНЫЙ ЦЕХ</h2>
        <button class="btn" onclick="alert('АНТИ-ХАКЕР: Включен протокол FUCK_YOU.exe')">🔒 Режим защиты</button>
        <button class="btn" onclick="alert('3D РЕНДЕР: Утки теперь в 4K')">🎥 Сверх-графика</button>
        <button class="btn" onclick="alert('PHONK: Музыка будет добавлена в V5')">🎶 Плеер Фонка</button>
        <button class="btn" style="border-color: red; color: red;" onclick="toggleSettings()">❌ ЗАКРЫТЬ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function placeObject(e) {
            document.getElementById('hint').style.display = 'none';
            let map = document.getElementById('map');
            let rect = map.getBoundingClientRect();
            let x = Math.floor((e.clientX - rect.left) / 30) * 30;
            let y = Math.floor((e.clientY - rect.top) / 30) * 30;

            let block = document.createElement('div');
            block.className = 'duck-object';
            block.style.left = x + 'px';
            block.style.top = y + 'px';
            map.appendChild(block);
        }

        function clearMap() {
            document.getElementById('map').innerHTML = '<p id="hint">Нажми на сетку, чтобы строить блоки</p>';
        }

        function upgradeEngine() {
            tg.showConfirm("Потратить 500 золотых уток на улучшение?", (ok) => {
                if(ok) tg.showAlert("ДВИЖОК УЛУЧШЕН! Теперь объекты светятся ярче.");
            });
        }

        function toggleSettings() {
            let s = document.getElementById('settings-panel');
            s.style.display = (s.style.display == 'block') ? 'none' : 'block';
        }

        function saveProject() {
            tg.showAlert("Проект 'Duck Mode' сохранен в облаке Октокота! 🐙");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck Studio Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --gold: #ffd700; --bg: #0a0a0a; }
        body { background: var(--bg); color: var(--neon); font-family: 'Consolas', monospace; margin: 0; overflow: hidden; }
        
        /* ИНТЕРФЕЙС ШТАБА */
        .top-bar { display: flex; justify-content: space-between; padding: 10px; background: #111; border-bottom: 2px solid var(--neon); font-size: 12px; }
        .money-count { color: var(--gold); }

        /* ИГРОВОЕ ПОЛЕ */
        #viewport { 
            width: 100vw; height: 250px; background: #151515; position: relative;
            background-image: radial-gradient(circle, #333 1px, transparent 1px); background-size: 20px 20px;
            overflow: hidden; cursor: crosshair;
        }
        .obj { position: absolute; width: 20px; height: 20px; border-radius: 3px; box-shadow: 0 0 5px currentColor; transition: 0.2s; }

        /* ИНСТРУМЕНТЫ */
        .toolbar { display: flex; background: #1a1a1a; padding: 10px; gap: 10px; overflow-x: auto; border-bottom: 1px solid #333; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; border: 2px solid white; cursor: pointer; flex-shrink: 0; }
        
        /* СКРИПТ-ЗОНА */
        .script-zone { padding: 10px; }
        textarea { width: 90%; background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; font-family: monospace; height: 60px; border-radius: 5px; }

        /* КНОПКИ */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .btn { background: #222; border: 1px solid var(--neon); color: var(--neon); padding: 12px; border-radius: 5px; font-size: 11px; cursor: pointer; }
        .btn:active { background: var(--neon); color: #000; }
        .btn-gold { border-color: var(--gold); color: var(--gold); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="top-bar">
    <div>LVL: <span id="lvl">1</span></div>
    <div class="money-count">DUCKS: <span id="balance">1000</span> 🟡</div>
    <div id="mode-display">MODE: 2D</div>
</div>

<div class="toolbar" id="palette">
    <div class="color-dot" style="background: #00f2ff;" onclick="setColor('#00f2ff')"></div>
    <div class="color-dot" style="background: #ff00ff;" onclick="setColor('#ff00ff')"></div>
    <div class="color-dot" style="background: #ffd700;" onclick="setColor('#ffd700')"></div>
    <div class="color-dot" style="background: #ff4444;" onclick="setColor('#ff4444')"></div>
    <div class="color-dot" style="background: #44ff44;" onclick="setColor('#44ff44')"></div>
</div>

<div id="viewport" onclick="spawn(event)"></div>

<div class="script-zone">
    <label>📜 PYTHON/JS SCRIPT ENGINE:</label>
    <textarea id="scriptInput" placeholder="move_objects(speed=5)..."></textarea>
</div>

<div class="controls">
    <button class="btn" onclick="toggleMode()">🔄 СМЕНИТЬ 2D/3D</button>
    <button class="btn" onclick="executeScript()">▶️ ЗАПУСТИТЬ СКРИПТ</button>
    <button class="btn btn-gold" onclick="buyUpgrade()">⚡ УЛУЧШИТЬ (500 🟡)</button>
    <button class="btn" onclick="publishProject()">🌐 ОПУБЛИКОВАТЬ</button>
    <button class="btn" onclick="clearAll()" style="border-color: red; color: red;">🧹 СБРОС</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let currentColor = '#00f2ff';
    let balance = 1000;
    let level = 1;
    let is3D = false;

    function setColor(c) {
        currentColor = c;
        tg.HapticFeedback.impactOccurred('light');
    }

    function spawn(e) {
        const view = document.getElementById('viewport');
        const rect = view.getBoundingClientRect();
        const x = e.clientX - rect.left - 10;
        const y = e.clientY - rect.top - 10;

        const obj = document.createElement('div');
        obj.className = 'obj';
        obj.style.left = x + 'px';
        obj.style.top = y + 'px';
        obj.style.color = currentColor;
        obj.style.background = currentColor;
        
        if(is3D) {
            obj.style.transform = 'rotateX(45deg) rotateZ(45deg)';
            obj.style.height = '40px';
        }

        view.appendChild(obj);
    }

    function toggleMode() {
        is3D = !is3D;
        document.getElementById('mode-display').innerText = is3D ? "MODE: 3D" : "MODE: 2D";
        tg.showAlert(is3D ? "Переход в 3D пространство Октокота..." : "Возврат в 2D чертежи.");
    }

    function buyUpgrade() {
        if(balance >= 500) {
            balance -= 500;
            level++;
            document.getElementById('balance').innerText = balance;
            document.getElementById('lvl').innerText = level;
            tg.showAlert("Движок улучшен до LVL " + level + "! Разблокированы новые частицы.");
        } else {
            tg.showAlert("Недостаточно золотых уток! Нужно больше ресурсов.");
        }
    }

    function executeScript() {
        const sc = document.getElementById('scriptInput').value;
        if(sc.includes("move")) {
            const objs = document.querySelectorAll('.obj');
            objs.forEach(o => { o.style.left = (parseInt(o.style.left) + 50) + 'px'; });
            tg.HapticFeedback.notificationOccurred('success');
        } else {
            tg.showAlert("Скрипт принят! Октокот обрабатывает логику...");
        }
    }

    function publishProject() {
        tg.showConfirm("Опубликовать проект в облако Duck Games?", (ok) => {
            if(ok) tg.showAlert("✅ ПРОЕКТ ОПУБЛИКОВАН! Ссылка отправлена в штаб.");
        });
    }

    function clearAll() {
        document.getElementById('viewport').innerHTML = '';
    }
</script>

</body>
</html>
